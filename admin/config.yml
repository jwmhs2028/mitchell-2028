backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - label: "Homepage"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "Welcome Text", name: "welcome", widget: "string" }
          - { label: "Homecoming Info", name: "homecoming", widget: "text" }
          - { label: "Prom Info", name: "prom", widget: "text" }
